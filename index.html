  const hz = Math.round(200 * Math.pow(100, this.value / 100));
  FX.lpfCutoff = hz;
  if (globalLPF) globalLPF.frequency.setTargetAtTime(hz, audioCtx.currentTime, 0.01);
  document.getElementById('lpfVal').textContent = hz >= 20000 ? 'open' : hz >= 1000 ? `${(hz/1000).toFixed(1)}k` : `${hz}`;
});
document.getElementById('trmSlider').addEventListener('input', function () {
  const rate = this.value / 10;
  FX.tremolo = rate;
  if (tremoloLFO) tremoloLFO.frequency.setTargetAtTime(rate, audioCtx.currentTime, 0.01);
  if (tremoloDepthNode) tremoloDepthNode.gain.setTargetAtTime(rate > 0 ? 0.18 : 0, audioCtx.currentTime, 0.01);
  document.getElementById('trmVal').textContent = rate === 0 ? 'off' : `${rate.toFixed(1)}Hz`;
});
document.getElementById('dstSlider').addEventListener('input', function () {
  FX.distortion = this.value / 100;
  document.getElementById('dstVal').textContent = `${this.value}%`;
  if (selR >= 0 && S.cells[selR][selC]) S.cells[selR][selC].distortion = FX.distortion;
});
document.getElementById('dlySlider').addEventListener('input', function () {
  FX.delaySend = this.value / 100;
  document.getElementById('dlyVal').textContent = `${this.value}%`;
  if (selR >= 0 && S.cells[selR][selC]) S.cells[selR][selC].delaySend = FX.delaySend;
});
document.getElementById('fdbSlider').addEventListener('input', function () {
  FX.delayFeedback = this.value / 100;
  if (delayFeedbackNode) delayFeedbackNode.gain.setTargetAtTime(FX.delayFeedback, audioCtx.currentTime, 0.01);
  document.getElementById('fdbVal').textContent = `${this.value}%`;
});
document.getElementById('revSlider').addEventListener('input', function () {
  FX.reverbSend = this.value / 100;
  document.getElementById('revVal').textContent = `${this.value}%`;
  if (selR >= 0 && S.cells[selR][selC]) S.cells[selR][selC].reverbSend = FX.reverbSend;
});

// reset fx — per-note controls only
document.getElementById('fxResetBtn1').addEventListener('click', () => {
  FX.attack = 0.006; FX.cutoff = 18000; FX.resonance = 1.0;
  FX.detune = 0; FX.pan = 0; FX.distortion = 0; FX.delaySend = 0; FX.reverbSend = 0;

  document.getElementById('atkSlider').value  = 6;    document.getElementById('atkVal').textContent  = '6ms';
  document.getElementById('detSlider').value  = 0;    document.getElementById('detVal').textContent  = '0¢';
  document.getElementById('panSlider').value  = 0;    document.getElementById('panVal').textContent  = 'C';
  document.getElementById('cutSlider').value  = 100;  document.getElementById('cutVal').textContent  = 'open';
  document.getElementById('resSlider').value  = 0;    document.getElementById('resVal').textContent  = '1.0';
  document.getElementById('dstSlider').value  = 0;    document.getElementById('dstVal').textContent  = '0%';
  document.getElementById('dlySlider').value  = 0;    document.getElementById('dlyVal').textContent  = '0%';
  document.getElementById('revSlider').value  = 0;    document.getElementById('revVal').textContent  = '0%';

  if (selR >= 0 && S.cells[selR][selC]) {
    const n = S.cells[selR][selC];
    n.attack = FX.attack;   n.detune     = FX.detune;   n.pan = FX.pan;
    n.cutoff = FX.cutoff;   n.resonance  = FX.resonance;
    n.distortion = FX.distortion;
    n.delaySend  = FX.delaySend;  n.reverbSend = FX.reverbSend;
  }
});

// reset fx — global controls only
document.getElementById('fxResetBtn2').addEventListener('click', () => {
  FX.reverbLevel = 0.7; FX.hpfCutoff = 20; FX.lpfCutoff = 20000;
  FX.tremolo = 0; FX.delayFeedback = 0.35;

  document.getElementById('rvlSlider').value  = 70;   document.getElementById('rvlVal').textContent  = '70%';
  document.getElementById('hpfSlider').value  = 0;    document.getElementById('hpfVal').textContent  = 'open';
  document.getElementById('lpfSlider').value  = 100;  document.getElementById('lpfVal').textContent  = 'open';
  document.getElementById('trmSlider').value  = 0;    document.getElementById('trmVal').textContent  = 'off';
  document.getElementById('fdbSlider').value  = 35;   document.getElementById('fdbVal').textContent  = '35%';

  if (audioCtx) {
    const t = audioCtx.currentTime;
    reverbOutGain.gain.setTargetAtTime(0.7, t, 0.01);
    globalHPF.frequency.setTargetAtTime(20, t, 0.01);
    globalLPF.frequency.setTargetAtTime(20000, t, 0.01);
    tremoloLFO.frequency.setTargetAtTime(0, t, 0.01);
    tremoloDepthNode.gain.setTargetAtTime(0, t, 0.01);
    delayFeedbackNode.gain.setTargetAtTime(0.35, t, 0.01);
  }
});

/* ── Session save / load / share ────────────────────── */
function serializeState() {
  return {
    version: 1,
    pages:   S.pages.map(pg => pg.map(row => row.map(n => n ? {...n} : null))),
    page:    S.page,
    bpm:     S.bpm,
    scale:   S.scale,
    wave:    S.wave,
    volume:  S.volume,
    decay:   S.decay,
    fx:      {...FX},
    accent:  lineColor,
  };
}

function syncSlidersFromFX() {
  const f = FX;
  document.getElementById('atkSlider').value = Math.round(f.attack * 1000);
  document.getElementById('atkVal').textContent = `${Math.round(f.attack * 1000)}ms`;
  document.getElementById('detSlider').value = Math.round(f.detune);
  document.getElementById('detVal').textContent = `${Math.round(f.detune)}¢`;
  const pan = f.pan ?? 0;
  document.getElementById('panSlider').value = pan;
  document.getElementById('panVal').textContent = pan === 0 ? 'C' : pan < 0 ? `L${-pan}` : `R${pan}`;
  const cutSl = Math.round(Math.log(Math.max(f.cutoff, 201) / 200) / Math.log(100) * 100);
  document.getElementById('cutSlider').value = cutSl;
  document.getElementById('cutVal').textContent = f.cutoff >= 18000 ? 'open' : f.cutoff >= 1000 ? `${(f.cutoff/1000).toFixed(1)}k` : `${Math.round(f.cutoff)}`;
  document.getElementById('resSlider').value = Math.round((f.resonance - 0.1) / 11.9 * 100);
  document.getElementById('resVal').textContent = f.resonance.toFixed(1);
  document.getElementById('dstSlider').value = Math.round(f.distortion * 100);
  document.getElementById('dstVal').textContent = `${Math.round(f.distortion * 100)}%`;
  document.getElementById('dlySlider').value = Math.round(f.delaySend * 100);
  document.getElementById('dlyVal').textContent = `${Math.round(f.delaySend * 100)}%`;
  document.getElementById('revSlider').value = Math.round(f.reverbSend * 100);
  document.getElementById('revVal').textContent = `${Math.round(f.reverbSend * 100)}%`;
  document.getElementById('rvlSlider').value = Math.round(f.reverbLevel * 100);
  document.getElementById('rvlVal').textContent = `${Math.round(f.reverbLevel * 100)}%`;
  const hpfSl = Math.round(Math.log(Math.max(f.hpfCutoff, 21) / 20) / Math.log(100) * 100);
  document.getElementById('hpfSlider').value = hpfSl;
  document.getElementById('hpfVal').textContent = f.hpfCutoff <= 20 ? 'open' : f.hpfCutoff >= 1000 ? `${(f.hpfCutoff/1000).toFixed(1)}k` : `${f.hpfCutoff}`;
  const lpfSl = Math.round(Math.log(Math.max(f.lpfCutoff, 201) / 200) / Math.log(100) * 100);
  document.getElementById('lpfSlider').value = lpfSl;
  document.getElementById('lpfVal').textContent = f.lpfCutoff >= 20000 ? 'open' : f.lpfCutoff >= 1000 ? `${(f.lpfCutoff/1000).toFixed(1)}k` : `${f.lpfCutoff}`;
  const trm = f.tremolo ?? 0;
  document.getElementById('trmSlider').value = Math.round(trm * 10);
  document.getElementById('trmVal').textContent = trm === 0 ? 'off' : `${trm.toFixed(1)}Hz`;
  document.getElementById('fdbSlider').value = Math.round(f.delayFeedback * 100);
  document.getElementById('fdbVal').textContent = `${Math.round(f.delayFeedback * 100)}%`;
}

function restoreState(data) {
  if (!data || data.version !== 1) return;

  S.pages = data.pages.map(pg => pg.map(row => row.map(n => n ? {...n} : null)));
  S.bpm    = data.bpm    ?? 120;
  S.scale  = data.scale  ?? 'major_pentatonic';
  S.wave   = data.wave   ?? 'sine';
  S.volume = data.volume ?? 0.70;
  S.decay  = data.decay  ?? 0.40;
  Object.assign(FX, data.fx ?? {});
  if (data.accent) setAccent(data.accent);

  // sync main sliders
  document.getElementById('bpmSlider').value = S.bpm;
  document.getElementById('bpmVal').textContent = S.bpm;
  document.getElementById('volSlider').value = Math.round(S.volume * 100);
  document.getElementById('volVal').textContent = `${Math.round(S.volume * 100)}%`;
  document.getElementById('decaySlider').value = Math.round(S.decay * 100);
  document.getElementById('decayVal').textContent = `${S.decay.toFixed(2)}s`;
  document.getElementById('scaleSelect').value = S.scale;
  document.querySelectorAll('#waveGroup .tui-btn').forEach(b =>
    b.classList.toggle('sel', b.dataset.wave === S.wave));

  // sync fx sliders
  syncSlidersFromFX();

  // sync audio nodes if running
  if (audioCtx) {
    const t = audioCtx.currentTime;
    if (reverbOutGain)    reverbOutGain.gain.setTargetAtTime(FX.reverbLevel, t, 0.01);
    if (globalHPF)        globalHPF.frequency.setTargetAtTime(FX.hpfCutoff, t, 0.01);
    if (globalLPF)        globalLPF.frequency.setTargetAtTime(FX.lpfCutoff, t, 0.01);
    if (tremoloLFO)       tremoloLFO.frequency.setTargetAtTime(FX.tremolo ?? 0, t, 0.01);
    if (tremoloDepthNode) tremoloDepthNode.gain.setTargetAtTime((FX.tremolo ?? 0) > 0 ? 0.18 : 0, t, 0.01);
    if (delayFeedbackNode) delayFeedbackNode.gain.setTargetAtTime(FX.delayFeedback, t, 0.01);
  }

  // switch page
  const targetPage = data.page ?? 0;
  S.page = targetPage;
  pageBtns.forEach((btn, i) => btn.classList.toggle('active', i === targetPage));

  clearSel();
  renderAll();
}

// ── Compression helpers (native CompressionStream) ──
async function compress(str) {
  const enc = new TextEncoder().encode(str);
  const cs  = new CompressionStream('deflate-raw');
  const w   = cs.writable.getWriter();
  w.write(enc); w.close();
  const chunks = []; const r = cs.readable.getReader();
  while (true) { const {done, value} = await r.read(); if (done) break; chunks.push(value); }
  const out = new Uint8Array(chunks.reduce((n, c) => n + c.length, 0));
  let off = 0; for (const c of chunks) { out.set(c, off); off += c.length; }
  let bin = ''; for (let i = 0; i < out.length; i++) bin += String.fromCharCode(out[i]);
  return btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}

async function decompress(b64) {
  const pad = b64.replace(/-/g,'+').replace(/_/g,'/');
  const bin = atob(pad + '==='.slice((pad.length + 3) % 4 || 4));
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const ds = new DecompressionStream('deflate-raw');
  const w  = ds.writable.getWriter();
  w.write(bytes); w.close();
  const chunks = []; const r = ds.readable.getReader();
  while (true) { const {done, value} = await r.read(); if (done) break; chunks.push(value); }
  const out = new Uint8Array(chunks.reduce((n, c) => n + c.length, 0));
  let off = 0; for (const c of chunks) { out.set(c, off); off += c.length; }
  return new TextDecoder().decode(out);
}

// ── Save to file ─────────────────────────────────────
document.getElementById('saveBtn').addEventListener('click', () => {
  const json = JSON.stringify(serializeState());
  const blob = new Blob([json], {type: 'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `ig01_${Date.now()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);

  // iOS Safari ignores the download attribute and opens the blob in-tab.
  // Detect this by checking if the click likely did nothing (no download support)
  // and fall back to opening a copyable overlay with the raw JSON.
  const isIOS = /iP(hone|ad|od)/.test(navigator.userAgent) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  if (isIOS) {
    const ov = document.createElement('div');
    Object.assign(ov.style, {
      position:'fixed', inset:'0', zIndex:'99999', background:'rgba(0,0,0,0.94)',
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center',
      padding:'24px', boxSizing:'border-box',
    });
    const msg = document.createElement('div');
    msg.textContent = 'copy and save this text to a .json file';
    Object.assign(msg.style, {
      fontFamily:"'Share Tech Mono',monospace", fontSize:'12px', letterSpacing:'2px',
      color:'rgba(255,255,255,0.55)', marginBottom:'12px', textAlign:'center',
    });
    const ta = document.createElement('textarea');
    ta.value = json;
    ta.readOnly = true;
    Object.assign(ta.style, {
      width:'100%', flex:'1', maxHeight:'60vh', background:'#0a0a0a',
      border:'1px solid #333', color:'rgba(255,255,255,0.75)', padding:'10px',
      fontFamily:"'Share Tech Mono',monospace", fontSize:'11px', letterSpacing:'1px',
      resize:'none', outline:'none', borderRadius:'2px',
    });
    const close = document.createElement('button');
    close.textContent = 'close';
    Object.assign(close.style, {
      marginTop:'14px', background:'none', border:'none',
      fontFamily:"'Share Tech Mono',monospace", fontSize:'14px',
      letterSpacing:'2px', color:'rgba(255,255,255,0.55)', cursor:'pointer',
    });
    close.addEventListener('click', () => ov.remove());
    ov.appendChild(msg); ov.appendChild(ta); ov.appendChild(close);
    document.body.appendChild(ov);
    // auto-select text so user can copy immediately
    setTimeout(() => { ta.focus(); ta.select(); }, 100);
  }
});

// ── Load from file ───────────────────────────────────
document.getElementById('loadBtn').addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  // Must be in the DOM before .click() for iOS Safari to open the picker
  input.style.cssText = 'position:fixed;top:-999px;left:-999px;opacity:0;';
  document.body.appendChild(input);
  input.onchange = e => {
    const file = e.target.files[0];
    document.body.removeChild(input);
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try { restoreState(JSON.parse(ev.target.result)); }
      catch(err) { console.error('Session load failed', err); }
    };
    reader.readAsText(file);
  };
  input.click();
});

// ── Share via URL hash ───────────────────────────────
document.getElementById('shareBtn').addEventListener('click', async () => {
  const btn = document.getElementById('shareBtn');
  try {
    const encoded = await compress(JSON.stringify(serializeState()));
    const url = `${location.origin}${location.pathname}#${encoded}`;
    // Try Clipboard API first (requires secure context / HTTPS)
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(url);
      btn.textContent = 'copied!';
      btn.style.color = lineColor;
      setTimeout(() => { btn.textContent = 'share'; btn.style.color = ''; }, 1800);
    } else {
      // Fallback for local file:// or browsers without clipboard API
      prompt('copy this url to share your session:', url);
      btn.textContent = 'share';
    }
  } catch(err) {
    // Clipboard write blocked (e.g. file:// on mobile) — show prompt fallback
    try {
      const encoded = await compress(JSON.stringify(serializeState()));
      const url = `${location.origin}${location.pathname}#${encoded}`;
      prompt('copy this url to share your session:', url);
    } catch(e) { console.error('Share failed', e); }
    btn.textContent = 'share';
    btn.style.color = '';
  }
});

/* ── Init ───────────────────────────────────────────── */
buildPageBar();
buildStepBar();
buildRowBar();
buildGrid();
updateSelLabel();

// Restore from URL hash — runs after DOM is fully built
(async () => {
  const hash = location.hash.slice(1);
  if (!hash) return;
  try {
    const json = await decompress(hash);
    restoreState(JSON.parse(json));
    history.replaceState(null, '', location.pathname);
  } catch(err) {
    console.error('URL session restore failed', err);
  }
})();
</script>
